name: Publish to PyPI

# Triggered when a GitHub Release is published (including releases marked
# as "prerelease" — PyPI handles prerelease semantics via PEP 440 tag
# naming like v1.0.0rc1).
#
# The two-step flow is:
#   1. Push a `v*` tag → release-testpypi.yml publishes to TestPyPI.
#   2. Verify the wheel installs cleanly from TestPyPI.
#   3. Create a GitHub Release on that tag → this workflow publishes to PyPI.

on:
  release:
    types: [published]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Release tag v$TAG_VERSION does not match pyproject.toml version $PROJECT_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt -r requirements/dev.txt
          pip install -e .

      - name: Run tests
        run: pytest

  build-and-publish:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tiktok-metadata-kit
    permissions:
      id-token: write  # trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
